version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: yt_history
        description: "Raw YouTube Music watch history from Google Takeout"

models:
  - name: stg_yt_history
    description: "Cleaned YouTube Music watch events"
    columns:
      - name: watch_id
        tests: [unique, not_null]
      - name: watched_at
        tests: [not_null]
      - name: video_title
        tests: [not_null]
      - name: channel_name
        tests: [not_null]
      - name: watch_sec
        tests: [not_null]
